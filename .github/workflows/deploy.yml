name: Deploy FastAPI App

# Trigger workflow on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Build Docker image locally (optional, since we use Watchtower)
      - name: Build Docker image
        run: |
          docker build -t dunanabi/fastapi-demo:latest .

      # Step 3: Log in to Docker Hub
      - name: Docker login
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Step 4: Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push dunanabi/fastapi-demo:latest

      # Step 5: SSH to server and deploy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /root/fastapi-demo
            cd /root/fastapi-demo
            git pull origin main
            docker-compose up -d --build fastapi_app
