name: Deploy FastAPI App

# Trigger workflow on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code (needed to build Docker image)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Build Docker image locally (optional, mainly for pushing)
      - name: Build Docker image
        run: |
          docker build -t dunanabi/fastapi-demo:latest .

      # Step 3: Log in to Docker Hub
      - name: Docker login
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Step 4: Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push dunanabi/fastapi-demo:latest

      # Step 5: SSH to server and deploy Docker container
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest image from Docker Hub
            docker pull dunanabi/fastapi-demo:latest
            # Stop old container if exists
            docker stop fastapi_app || true
            docker rm fastapi_app || true
            # Run new container
            docker run -d --name fastapi_app -p 8675:3000 dunanabi/fastapi-demo:latest
